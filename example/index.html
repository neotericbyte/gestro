<!DOCTYPE html>
<html>

<head>
	<title>Gestro Demo</title>

	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

	<style>
		* {
			box-sizing: border-box;
		}

		html,
		body {
			margin: 0;
			height: 100%;
			font-family: system-ui, sans-serif;
			background: #111;
			color: #fff;
		}

		.app {
			display: flex;
			flex-direction: column;
			height: 100%;
		}

		.editor-container {
			flex: 1;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 10px;
		}

		gestro-image {
			width: 100%;
			max-width: 400px;
			aspect-ratio: 3 / 4;
			border-radius: 12px;
			overflow: hidden;
		}

		/* =========================
		   CONTROLS PANEL
		========================= */

		.controls {
			padding: 14px;
			display: flex;
			flex-direction: column;
			gap: 14px;
			background: #161616;
			border-top: 1px solid #2a2a2a;
		}

		.row {
			display: flex;
			gap: 10px;
		}

		button,
		label {
			flex: 1;
			padding: 12px;
			border-radius: 10px;
			border: none;
			background: #2a2a2a;
			color: #fff;
			cursor: pointer;
			text-align: center;
			font-size: 14px;
		}

		.primary {
			background: #4caf50;
		}

		.upload {
			background: #2196f3;
		}

		input[type="file"] {
			display: none;
		}

		/* =========================
		   SLIDER CARD
		========================= */

		.control-group {
			display: flex;
			flex-direction: column;
			gap: 6px;
			padding: 10px;
			background: #1c1c1c;
			border-radius: 12px;
		}

		.label {
			display: flex;
			justify-content: space-between;
			font-size: 13px;
			color: #bbb;
		}

		input[type="range"] {
			-webkit-appearance: none;
			width: 100%;
			height: 6px;
			border-radius: 999px;
			background: #2b2b2b;
			outline: none;
		}

		input[type="range"]::-webkit-slider-thumb {
			-webkit-appearance: none;
			width: 18px;
			height: 18px;
			border-radius: 50%;
			background: #4caf50;
			cursor: pointer;
			box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.2);
		}

		input[type="range"]::-moz-range-thumb {
			width: 18px;
			height: 18px;
			border-radius: 50%;
			background: #4caf50;
			cursor: pointer;
		}
	</style>

	<script type="module">
		import "../src/gestro-image.js";

		window.addEventListener("DOMContentLoaded", () => {

			const editor = document.getElementById("editor");
			const fileInput = document.getElementById("fileInput");
			const zoomSlider = document.getElementById("zoomSlider");
			const rotateSlider = document.getElementById("rotateSlider");

			const zoomValue = document.getElementById("zoomValue");
			const rotateValue = document.getElementById("rotateValue");

			const init = () => {
				if (!editor || typeof editor.setImage !== "function") {
					requestAnimationFrame(init);
					return;
				}
				editor.setImage("https://picsum.photos/800/1200");
			};

			init();

			fileInput.onchange = e => {
				const file = e.target.files[0];
				if (!file) return;

				const reader = new FileReader();
				reader.onload = () => editor.setImage(reader.result);
				reader.readAsDataURL(file);

				fileInput.value = "";
			};

			window.reset = () => {
				editor.resetTransform();
				zoomSlider.value = 1;
				rotateSlider.value = 0;
				zoomValue.textContent = "1.00x";
				rotateValue.textContent = "0°";
			};

			window.exportImage = async () => {
				const data = await editor.exportImage();
				const a = document.createElement("a");
				a.href = data;
				a.download = "gestro.png";
				a.click();
			};

			zoomSlider.oninput = () => {
				const val = parseFloat(zoomSlider.value);
				editor.setZoom(val);
				zoomValue.textContent = val.toFixed(2) + "x";
			};

			rotateSlider.oninput = () => {
				const val = parseFloat(rotateSlider.value);
				editor.setRotation(val);
				rotateValue.textContent = val + "°";
			};

		});
	</script>

</head>

<body>

	<div class="app">

		<div class="editor-container">
			<gestro-image id="editor"></gestro-image>
		</div>

		<div class="controls">

			<div class="row">
				<label class="upload">
					📤 Upload
					<input type="file" id="fileInput" accept="image/*">
				</label>

				<button onclick="reset()">🔄 Reset</button>
				<button class="primary" onclick="exportImage()">⬇️ Export</button>
			</div>

			<div class="control-group">
				<div class="label">
					<span>🔍 Zoom</span>
					<span id="zoomValue">1.00x</span>
				</div>
				<input type="range" id="zoomSlider" min="0.5" max="3" step="0.01" value="1">
			</div>

			<div class="control-group">
				<div class="label">
					<span>🔄 Rotate</span>
					<span id="rotateValue">0°</span>
				</div>
				<input type="range" id="rotateSlider" min="-180" max="180" step="1" value="0">
			</div>

		</div>

	</div>

</body>

</html>
