<!DOCTYPE html>
<html>

<head>
	<title>Gestro Demo</title>

	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

	<style>
		* {
			box-sizing: border-box;
		}

		html,
		body {
			margin: 0;
			height: 100%;
			font-family: system-ui, sans-serif;
			background: #111;
			color: #fff;
		}

		.app {
			display: flex;
			flex-direction: column;
			height: 100%;
		}

		.editor-container {
			flex: 1;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 10px;
		}

		gestro-image {
			width: 100%;
			max-width: 400px;
			aspect-ratio: 3 / 4;
			border-radius: 12px;
			overflow: hidden;
		}

		.controls {
			padding: 12px;
			display: flex;
			flex-direction: column;
			gap: 12px;
		}

		.row {
			display: flex;
			gap: 10px;
		}

		button,
		label {
			flex: 1;
			padding: 12px;
			border-radius: 10px;
			border: none;
			background: #2a2a2a;
			color: #fff;
			cursor: pointer;
		}

		.primary {
			background: #4caf50;
		}

		.upload {
			background: #2196f3;
		}

		input[type="file"] {
			display: none;
		}

		input[type="range"] {
			width: 100%;
		}
	</style>

	<!-- ✅ IMPORTANT: module import -->
	<script type="module">
		import "../src/gestro-image.js";

		// wait for DOM + element upgrade
		window.addEventListener("DOMContentLoaded", () => {

			const editor = document.getElementById("editor");
			const fileInput = document.getElementById("fileInput");
			const zoomSlider = document.getElementById("zoomSlider");
			const rotateSlider = document.getElementById("rotateSlider");

			// safe wait for custom element readiness
			const init = () => {
				if (!editor || typeof editor.setImage !== "function") {
					requestAnimationFrame(init);
					return;
				}

				editor.setImage("https://picsum.photos/800/1200");
			};

			init();

			// Upload
			fileInput.onchange = e => {
				const file = e.target.files[0];
				if (!file) return;

				const reader = new FileReader();
				reader.onload = () => editor.setImage(reader.result);
				reader.readAsDataURL(file);

				fileInput.value = "";
			};

			// Reset
			window.reset = () => {
				editor.resetTransform();
				zoomSlider.value = 1;
				rotateSlider.value = 0;
			};

			// Export
			window.exportImage = async () => {
				const data = await editor.exportImage();
				const a = document.createElement("a");
				a.href = data;
				a.download = "gestro.png";
				a.click();
			};

			// Zoom
			zoomSlider.oninput = () => {
				editor.setZoom(parseFloat(zoomSlider.value));
			};

			// Rotate
			rotateSlider.oninput = () => {
				editor.setRotation(parseFloat(rotateSlider.value));
			};
		});
	</script>

</head>

<body>

	<div class="app">

		<div class="editor-container">
			<gestro-image id="editor"></gestro-image>
		</div>

		<div class="controls">

			<div class="row">
				<label class="upload">
					Upload
					<input type="file" id="fileInput" accept="image/*">
				</label>
				<button onclick="reset()">Reset</button>
				<button class="primary" onclick="exportImage()">Export</button>
			</div>

			<input type="range" id="zoomSlider" min="0.5" max="3" step="0.01" value="1">
			<input type="range" id="rotateSlider" min="-180" max="180" step="1" value="0">

		</div>

	</div>

</body>

</html>
