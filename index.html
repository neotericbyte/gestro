<!DOCTYPE html>
<html>

<head>
    <title>Image Editor POC</title>

    <!-- Mobile viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="gesture-image.js"></script>

    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            margin: 0;
            height: 100%;
            font-family: system-ui, sans-serif;
            background: #111;
            color: #fff;
            touch-action: manipulation;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Header */
        .header {
            padding: 12px;
            text-align: center;
            font-weight: 600;
            border-bottom: 1px solid #333;
            background: #181818;
        }

        /* Editor Area */
        .editor-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        gesture-image {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3 / 4;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 10px;
            padding: 12px;
            border-top: 1px solid #333;
            background: #181818;
        }

        button,
        label {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
        }

        button {
            background: #2a2a2a;
            color: #fff;
        }

        button:active {
            transform: scale(0.96);
        }

        .primary {
            background: #4caf50;
            color: #fff;
        }

        .upload {
            background: #2196f3;
            color: #fff;
        }

        input[type="file"] {
            display: none;
        }

        /* Preview */
        .preview {
            padding: 10px;
            text-align: center;
        }

        .preview img {
            width: 120px;
            border-radius: 8px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="app">

        <div class="header">Image Editor POC</div>

        <div class="editor-container">
            <gesture-image id="editor"></gesture-image>
        </div>

        <div class="controls">
            <label class="upload">
                Upload
                <input type="file" id="fileInput" accept="image/*">
            </label>

            <button onclick="resetImage()">Reset</button>

            <button class="primary" onclick="exportImage()">Export</button>
        </div>

        <div class="preview" id="preview"></div>

    </div>

    <script>
        const editor = document.getElementById("editor");
        const fileInput = document.getElementById("fileInput");
        const preview = document.getElementById("preview");

        // Load default image
        editor.setImage("https://picsum.photos/800/1200");

        // Upload image
        fileInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = () => {
                editor.setImage(reader.result);
            };
            reader.readAsDataURL(file);
        });

        // Reset
        function resetImage() {
            editor.setImage(editor.img?.src || "https://picsum.photos/800/1200");
        }

        // Export
        async function exportImage() {
            const data = await editor.exportImage();

            preview.innerHTML = `
    <div>Export Preview</div>
    <img src="${data}" />
  `;
        }

        /* -------------------------
           Zoom blockers (mobile)
        -------------------------- */

        // block pinch zoom
        document.addEventListener('touchmove', function (e) {
            if (e.scale !== 1) e.preventDefault();
        }, { passive: false });

        // block double tap zoom
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (e) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // iOS Safari
        document.addEventListener('gesturestart', e => e.preventDefault());
        document.addEventListener('gesturechange', e => e.preventDefault());
        document.addEventListener('gestureend', e => e.preventDefault());
    </script>

</body>

</html>
